<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Origin - Diagnostic UI</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1>ORIGIN CORE</h1>
        <div id="status" class="status-offline">DISCONNECTED</div>
      </header>

      <section class="panel">
        <h2>System Telemetry</h2>
        <div class="telemetry-grid">
          <div><strong>Node ID:</strong> <span id="val-node-id">N/A</span></div>
          <div><strong>CPU Load:</strong> <span id="val-cpu-load">0.0%</span></div>
          <div><strong>Temperature:</strong> <span id="val-temp">0.0°C</span></div>
          <div><strong>Spin State:</strong> <span id="val-spin">0</span></div>
        </div>
      </section>

      <section class="panel">
        <h2>Network & Immune Log</h2>
        <div id="sys-log" class="log-box">
          <div>> System booting...</div>
        </div>
      </section>

      <section class="panel">
        <h2>Peer-to-Peer Comm Link</h2>
        <div id="chat-log" class="log-box"></div>
        <div class="chat-input-row">
          <input type="text" id="chat-input" placeholder="Enter message to broadcast..." />
          <button id="btn-send">SEND</button>
        </div>
      </section>

      <section class="panel hologram-panel">
        <h2>Holographic Projection Chamber</h2>
        <div id="holo-dropzone" class="dropzone">
          <p>Drag & Drop a file here to project into the swarm</p>
        </div>
        <div id="holo-reconstruct-box" class="reconstruct-box">
          <p>Incoming shards will reconstruct here...</p>
        </div>
      </section>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
