name: 'Publish Origin App'
on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  publish-desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            rust_target: 'aarch64-apple-darwin'
            artifact_path: |
              origin_ui/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              origin_ui/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            rust_target: 'x86_64-apple-darwin'
            artifact_path: |
              origin_ui/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
              origin_ui/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app
          - platform: 'ubuntu-22.04'
            args: ''
            rust_target: ''
            artifact_path: |
              origin_ui/src-tauri/target/release/bundle/deb/*.deb
              origin_ui/src-tauri/target/release/bundle/appimage/*.AppImage
              origin_ui/src-tauri/target/release/bundle/rpm/*.rpm
          - platform: 'windows-latest'
            args: ''
            rust_target: ''
            artifact_path: |
              origin_ui/src-tauri/target/release/bundle/msi/*.msi
              origin_ui/src-tauri/target/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.platform }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        working-directory: ./origin_ui
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: './origin_ui'
          tagName: app-v__VERSION__
          releaseName: 'Origin App v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: origin-desktop-${{ matrix.platform }}-${{ matrix.rust_target || 'native' }}
          path: ${{ matrix.artifact_path }}

  publish-android:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: setup java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: setup android sdk
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;25.2.9519653'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        working-directory: ./origin_ui
        run: npm install

      - name: build android app
        working-directory: ./origin_ui
        env:
          NDK_HOME: /usr/local/lib/android/sdk/ndk/25.2.9519653
        run: npm run tauri android build

      - name: Sign APK manually
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo $KEYSTORE_BASE64 | base64 --decode > release.keystore
          APK_DIR="origin_ui/src-tauri/gen/android/app/build/outputs/apk/universal/release"
          APK_FILE="$APK_DIR/app-universal-release-unsigned.apk"
          SIGNED_APK_FILE="$APK_DIR/app-universal-release.apk"
          
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | sort -V | tail -n 1)
          echo "Using build tools from $BUILD_TOOLS_DIR"
          
          $BUILD_TOOLS_DIR/zipalign -v -p 4 $APK_FILE $SIGNED_APK_FILE
          $BUILD_TOOLS_DIR/apksigner sign --ks release.keystore --ks-pass env:KEYSTORE_PASSWORD --key-pass env:KEY_PASSWORD --ks-key-alias "$KEY_ALIAS" $SIGNED_APK_FILE
          
          echo "SIGNED_RELEASE_FILE=$SIGNED_APK_FILE" >> $GITHUB_ENV

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: origin-android-signed-apk
          path: ${{ env.SIGNED_RELEASE_FILE }}

  publish-ios:
    permissions:
      contents: write
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: install frontend dependencies
        working-directory: ./origin_ui
        run: npm install

      - name: initialize iOS project
        working-directory: ./origin_ui
        run: npm run tauri ios init

      - name: build iOS app
        working-directory: ./origin_ui
        run: npm run tauri ios build -- --export-method development
        continue-on-error: true

      - name: Upload iOS Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: origin-ios-build
          path: |
            origin_ui/src-tauri/gen/apple/build/**/*.ipa
            origin_ui/src-tauri/gen/apple/build/**/*.app
          if-no-files-found: ignore
